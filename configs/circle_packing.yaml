problem: circle_packing
num_circles: 26
target: 2.635983

# search budget
num_iters: 100
num_parents: 8              # n parents per iteration (UCT, no repeat)
rollouts_per_parent: 24      # k rollouts per parent -> 16 rollouts / iteration
num_seeds: 8                # initial independent seeds

# Resume / warm-start: if true, rebuild the archive from a PRIOR run's saved
# programs and continue instead of bootstrapping fresh seeds. resume_from sets an
# explicit run dir; empty => auto-pick the most recent runs/circle_packing_* dir.
resume: false
resume_from: ""
resume_top_k: 400             # keep only the top-K loaded programs by value (0 = all)

# Circle-packing scoring is DETERMINISTIC for a fixed packing, so multiple eval
# seeds all return the identical value (dsigma=0). 1 seed = same signal, 5x less
# sandbox work. Bump this only for a genuinely stochastic problem.
num_eval_seeds: 1

explore_eps: 0.1            # P(a rollout makes a fresh seed instead of mutating)

# Per-sandbox wall-clock cap. Was 100: a slow/looping generated optimizer could
# block a worker for 100s. 30 matches the TTT default and keeps the pool moving.
timeout: 100.0

# Parallel sandbox evaluation (the TTT reward pool). 0 = auto (= cpu count).
reward_workers: 50

# UCT / archive
uct_c: 1.0
max_archive: 2000
topk_children: 3

# bands
# bands_absolute: true => q_* are FRACTIONS OF THE KNOWN TARGET (here 2.635983),
# so near_sota = value >= q_near*target = 2.622, elite >= 0.90*target = 2.372,
# good >= 0.70*target = 1.845. false => q_* are quantiles of the live archive
# (the old relative behavior, where the best-so-far seeds land in near_sota).
bands_absolute: true
# q_good: 0.70
# q_elite: 0.95
# q_near: 0.995


q_good: 0.94
q_elite: 0.994
q_near: 0.9995

# gate
parent_sim_threshold: 0.99
novelty_threshold: 0.95
novelty_topk: 10

# llm (frozen policy, loaded in-process via Unsloth; --llm-backend dummy to wire-test offline)
llm_backend: unsloth
llm_model: "Qwen/Qwen3-8B"
max_seq_length: 32000
load_in_4bit: false

# Thinking ON, per request. This is now the dominant cost: every rollout decodes
# thousands of <think> tokens before the code. The token budget below must be
# large enough to think AND emit the program, or you get truncated "no_code".
# If you want raw TTT speed, set enable_thinking: false (TTT ran with it off).
enable_thinking: false
max_new_tokens: 16000

# Bigger thinking budget x batch = VRAM. llm.py halves the batch on OOM; you can
# also drop this. Larger batch = better GPU utilization on the decode.
gen_batch_size: 8

temperature: 1.0
top_p: 1.0

# Multi-GPU data parallelism. Empty / single id = one model on one GPU. List 2+
# physical GPU ids to replicate the frozen model across them: each gets its own
# process + full copy, and each iteration's rollout prompts are sharded across
# them. Overridable with --gpu-ids "0,3" or env BANDIT_GPUS=0,3.
# gpu_ids: [0,1,2,3]
gpu_ids: [7]

seed: 42

# ====================================================================
# RL (GRPO) fine-tuning of the mutator.
# rl_enabled: true swaps the frozen UnslothLLM for a trainable model with LoRA
# adapters and runs the GRPO loop. rl_adapter_bands lists which bands get a
# trainable adapter (here good + near_sota); the bands NOT listed generate from
# the frozen base and are never trained. Set rl_enabled: false for a frozen run.
#
# GPUs under RL: the trainable model + GRPO update run on gpu_ids[0]; the REST of
# gpu_ids run data-parallel rollout-generation replicas (each reloads the LoRA
# adapter every iteration). With a single gpu_ids entry, generation + training
# share that one GPU. gpu_ids are PHYSICAL ids and override run.sh's
# CUDA_VISIBLE_DEVICES, so gpu_ids: [0,1,2,3] => train on GPU 0, generate on 1/2/3.
#
# MEMORY: the knobs above (max_seq_length 32000 / max_new_tokens 16000) are tuned
# for the frozen multi-GPU run and are heavy for RL (logprobs are recomputed WITH
# gradients). For RL prefer something like the commented overrides below.
# ====================================================================
rl_enabled: true
# RL algorithm:
#   grpo -> critic-free, group-max-anchored advantage (max-seeking).
#   a2c  -> adds a learned value-head critic V(s); advantage = (r - V), still
#           max-anchored (the critic regresses toward the group max). Tune the
#           critic with rl_vf_coef / rl_vf_lr below.
rl_algo: a2c
# Bands that get a trainable LoRA adapter; the rest (weak) generate from the
# frozen base and are never trained. Overrides rl_adapter_per_band.
rl_adapter_bands: [good, near_sota, elite]
rl_adapter_per_band: true   # only used when rl_adapter_bands is empty
rl_group_size: 32            # G completions per (parent, arm) = one GRPO group
rl_train_every: 1           # GRPO update every N iterations
rl_ppo_epochs: 1            # 1 => REINFORCE + group baseline + KL leash
rl_lr: 5.0e-5
rl_kl_coef: 0.1
rl_clip_eps: 0.2
rl_grad_clip: 1.0
rl_max_completion_tokens: 2048
rl_lora_r: 32
rl_lora_alpha: 32
rl_lora_dropout: 0.0
rl_reward_nocode: -0.2
rl_reward_invalid: -0.1
rl_reward_sterile: -0.05
rl_adv_eps: 1.0e-6
rl_min_group_std: 1.0e-8
# A2C only (ignored when rl_algo: grpo):
rl_vf_coef: 0.5             # weight on the critic (value) MSE loss
rl_vf_lr: 1.0e-5            # critic (value head) learning rate

# Recommended RL generation overrides (uncomment for an actual RL run; these
# replace the frozen values above for memory):
# max_seq_length: 8192
# max_new_tokens: 2048
# gen_batch_size: 16